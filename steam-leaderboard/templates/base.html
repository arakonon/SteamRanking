<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Steam Leaderboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

  <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex items-center gap-6">
    <span class="text-blue-400 font-bold text-lg tracking-wide">🎮 Steam Leaderboard</span>
    <a href="/" class="text-gray-300 hover:text-white transition-colors">Übersicht</a>
    <a href="/leaderboard?period=week" class="text-gray-300 hover:text-white transition-colors">Rangliste</a>
  </nav>

  <main class="px-6 py-8 max-w-6xl mx-auto">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
